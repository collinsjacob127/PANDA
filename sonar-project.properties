sonar-project.properties:
sonar.projectKey=PANDA2
sonar.cfamily.compile-commands=compile_commands.json
sonar.cxx.file.suffixes=.cxx,.cpp,.cc,.c,.hxx,.hpp,.hh,.h
sonar.exclusions= \
**/build/**, \
**/docs/**, \
**/icons/**, \
**/icons/**, \
**/images/**, \
**/libs/**, \
**/tests/**, \
**/ui/**, \
**/venv/**
sonar.tests=tests/
sonar.cxx.bullseye.reportPaths=coverage.xml